# Tunnel mode: nginx is reachable only via cloudflared over the internal docker
# network. TLS is terminated at the Cloudflare edge; cloudflared forwards plain
# HTTP to nginx:80. There are no public ports.
log_format main_cf '$remote_addr cfip=$http_cf_connecting_ip '
                  'cfip6=$http_cf_connecting_ipv6 cfp4=$http_cf_pseudo_ipv4 edge=$realip_remote_addr '
                  'host=$host method=$request_method uri=$request_uri status=$status '
                  'bytes=$body_bytes_sent rt=$request_time '
                  'ua="$http_user_agent" ray=$http_cf_ray';

access_log /dev/stdout main_cf;
error_log /dev/stderr warn;

server {
    listen 80 default_server;
    server_name tally.spode.dev;
    root /var/www/html/public;
    index index.php;

    # cloudflared connects from the internal docker network and forwards the real
    # visitor IP in CF-Connecting-IP. Trust only the private docker range.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    client_max_body_size 8M;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /build/assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /build/manifest.json {
        access_log off;
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # The edge<->visitor leg is HTTPS; tell PHP/Laravel so it builds https URLs
        # and sets secure cookies, without trusting spoofable forwarded headers.
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
